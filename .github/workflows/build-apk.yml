name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Set up Java (required for Android SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        # Install additional dependencies
        sudo apt-get update
        sudo apt-get install -y libatlas-base-dev libjpeg-dev zlib1g-dev
    
    - name: Accept Android licenses
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses <<< "y" || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-31" "build-tools;31.0.0" || true
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Webhook Sender
        package.name = webhooksender
        package.domain = org.webhooksender
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0.0
        requirements = python3,kivy,httpx,requests
        orientation = portrait
        fullscreen = 0
        android.permissions = INTERNET
        android.api = 31
        android.minapi = 21
        android.ndk = 25b
        android.accept_sdk_license = True
        android.logcat_filters = *:S python:D
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF
    
    - name: Build APK with buildozer
      run: |
        buildozer android debug
      env:
        ANDROID_HOME: /opt/android
        ANDROID_SDK_ROOT: /opt/android
    
    - name: Find APK
      run: |
        find . -name "*.apk" -type f
    
    - name: List artifact folders
      run: |
        ls -la bin || true
        ls -la dist || true
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: webhook-sender-apk
        path: |
          bin/*.apk
          dist/*.apk
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body: APK build for ${{ github.ref_name }}
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/') && success()
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./bin/webhooksender-debug.apk
        asset_name: webhooksender-${{ github.ref_name }}.apk
        asset_content_type: application/vnd.android.package-archive
